<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="rbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="400" fill="url(#rbg)" rx="12"/>

  <!-- Radar grid rings -->
  <g transform="translate(200,195)" fill="none" stroke="#6C63FF" stroke-width="0.5" opacity="0.15">
    <polygon points="0,-120 114.1,-37.1 70.6,97.1 -70.6,97.1 -114.1,-37.1"/>
    <polygon points="0,-96 91.3,-29.7 56.5,77.7 -56.5,77.7 -91.3,-29.7"/>
    <polygon points="0,-72 68.5,-22.3 42.4,58.3 -42.4,58.3 -68.5,-22.3"/>
    <polygon points="0,-48 45.6,-14.8 28.2,38.8 -28.2,38.8 -45.6,-14.8"/>
    <polygon points="0,-24 22.8,-7.4 14.1,19.4 -14.1,19.4 -22.8,-7.4"/>
    <!-- Axis lines -->
    <line x1="0" y1="0" x2="0" y2="-120" opacity="0.3"/>
    <line x1="0" y1="0" x2="114.1" y2="-37.1" opacity="0.3"/>
    <line x1="0" y1="0" x2="70.6" y2="97.1" opacity="0.3"/>
    <line x1="0" y1="0" x2="-70.6" y2="97.1" opacity="0.3"/>
    <line x1="0" y1="0" x2="-114.1" y2="-37.1" opacity="0.3"/>
  </g>

  <!-- Skill data polygon — animated draw-in -->
  <polygon points="200,75 314,158 271,292 129,292 86,158"
    fill="#6C63FF" fill-opacity="0.15" stroke="#6C63FF" stroke-width="2"
    stroke-dasharray="700" stroke-dashoffset="700" filter="url(#gl)">
    <animate attributeName="stroke-dashoffset" values="700;0" dur="2s" fill="freeze" begin="0.5s"/>
    <animate attributeName="fill-opacity" values="0;0.15" dur="1s" fill="freeze" begin="2s"/>
  </polygon>

  <!-- Data points -->
  <g>
    <!-- CV (top) -->
    <circle cx="200" cy="75" r="5" fill="#6C63FF" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="1.8s"/>
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <!-- DL (top-right) -->
    <circle cx="314" cy="158" r="5" fill="#00b4d8" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="1.9s"/>
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" begin="2.1s"/>
    </circle>
    <!-- Analytics (bottom-right) -->
    <circle cx="271" cy="292" r="5" fill="#e63946" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="2s"/>
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" begin="2.2s"/>
    </circle>
    <!-- Causal ML (bottom-left) -->
    <circle cx="129" cy="292" r="5" fill="#f4a261" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="2.1s"/>
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" begin="2.3s"/>
    </circle>
    <!-- NLP / LLMs (top-left) -->
    <circle cx="86" cy="158" r="5" fill="#2ec4b6" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="2.2s"/>
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" begin="2.4s"/>
    </circle>
  </g>

  <!-- Labels -->
  <g font-family="'Fira Code','Courier New',monospace" font-size="11" fill="#c9d1d9">
    <text x="200" y="55" text-anchor="middle" opacity="0">
      Computer Vision
      <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="2.5s"/>
    </text>
    <text x="335" y="158" text-anchor="start" opacity="0">
      Deep Learning
      <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="2.6s"/>
    </text>
    <text x="285" y="312" text-anchor="start" opacity="0">
      Data Analytics
      <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="2.7s"/>
    </text>
    <text x="115" y="312" text-anchor="end" opacity="0">
      Causal ML
      <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="2.8s"/>
    </text>
    <text x="65" y="158" text-anchor="end" opacity="0">
      NLP / LLMs
      <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="2.9s"/>
    </text>
  </g>

  <!-- Title -->
  <text x="200" y="380" text-anchor="middle" font-family="'Fira Code','Courier New',monospace" font-size="10" fill="#6C63FF" opacity="0.5">
    skill_radar.snapshot()
  </text>
</svg>