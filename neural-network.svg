<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="pulse1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#6C63FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="pulse2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00b4d8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="nodeGrad1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8b83ff"/>
      <stop offset="100%" style="stop-color:#6C63FF"/>
    </radialGradient>
    <radialGradient id="nodeGrad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#33c9f0"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </radialGradient>
    <radialGradient id="nodeGrad3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff6b8a"/>
      <stop offset="100%" style="stop-color:#e63946"/>
    </radialGradient>
  </defs>

  <rect width="900" height="300" fill="url(#bg)" rx="12"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#6C63FF" stroke-width="0.5">
    <line x1="0" y1="30" x2="900" y2="30"/><line x1="0" y1="60" x2="900" y2="60"/>
    <line x1="0" y1="90" x2="900" y2="90"/><line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="150" x2="900" y2="150"/><line x1="0" y1="180" x2="900" y2="180"/>
    <line x1="0" y1="210" x2="900" y2="210"/><line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="270" x2="900" y2="270"/>
    <line x1="90" y1="0" x2="90" y2="300"/><line x1="180" y1="0" x2="180" y2="300"/>
    <line x1="270" y1="0" x2="270" y2="300"/><line x1="360" y1="0" x2="360" y2="300"/>
    <line x1="450" y1="0" x2="450" y2="300"/><line x1="540" y1="0" x2="540" y2="300"/>
    <line x1="630" y1="0" x2="630" y2="300"/><line x1="720" y1="0" x2="720" y2="300"/>
    <line x1="810" y1="0" x2="810" y2="300"/>
  </g>

  <!-- ==================== NEURAL NETWORK ==================== -->
  
  <!-- Connection lines (Input -> Hidden1) -->
  <g stroke="#6C63FF" stroke-width="0.8" opacity="0.15">
    <line x1="100" y1="60" x2="270" y2="50"/><line x1="100" y1="60" x2="270" y2="110"/>
    <line x1="100" y1="60" x2="270" y2="170"/><line x1="100" y1="60" x2="270" y2="230"/>
    <line x1="100" y1="130" x2="270" y2="50"/><line x1="100" y1="130" x2="270" y2="110"/>
    <line x1="100" y1="130" x2="270" y2="170"/><line x1="100" y1="130" x2="270" y2="230"/>
    <line x1="100" y1="200" x2="270" y2="50"/><line x1="100" y1="200" x2="270" y2="110"/>
    <line x1="100" y1="200" x2="270" y2="170"/><line x1="100" y1="200" x2="270" y2="230"/>
    <line x1="100" y1="260" x2="270" y2="50"/><line x1="100" y1="260" x2="270" y2="110"/>
    <line x1="100" y1="260" x2="270" y2="170"/><line x1="100" y1="260" x2="270" y2="230"/>
  </g>

  <!-- Connection lines (Hidden1 -> Hidden2) -->
  <g stroke="#00b4d8" stroke-width="0.8" opacity="0.15">
    <line x1="270" y1="50" x2="450" y2="70"/><line x1="270" y1="50" x2="450" y2="140"/>
    <line x1="270" y1="50" x2="450" y2="210"/>
    <line x1="270" y1="110" x2="450" y2="70"/><line x1="270" y1="110" x2="450" y2="140"/>
    <line x1="270" y1="110" x2="450" y2="210"/>
    <line x1="270" y1="170" x2="450" y2="70"/><line x1="270" y1="170" x2="450" y2="140"/>
    <line x1="270" y1="170" x2="450" y2="210"/>
    <line x1="270" y1="230" x2="450" y2="70"/><line x1="270" y1="230" x2="450" y2="140"/>
    <line x1="270" y1="230" x2="450" y2="210"/>
  </g>

  <!-- Connection lines (Hidden2 -> Hidden3) -->
  <g stroke="#e63946" stroke-width="0.8" opacity="0.12">
    <line x1="450" y1="70" x2="630" y2="90"/><line x1="450" y1="70" x2="630" y2="170"/>
    <line x1="450" y1="140" x2="630" y2="90"/><line x1="450" y1="140" x2="630" y2="170"/>
    <line x1="450" y1="210" x2="630" y2="90"/><line x1="450" y1="210" x2="630" y2="170"/>
  </g>

  <!-- Connection lines (Hidden3 -> Output) -->
  <g stroke="#6C63FF" stroke-width="0.8" opacity="0.15">
    <line x1="630" y1="90" x2="800" y2="130"/><line x1="630" y1="90" x2="800" y2="190"/>
    <line x1="630" y1="170" x2="800" y2="130"/><line x1="630" y1="170" x2="800" y2="190"/>
  </g>

  <!-- === ANIMATED DATA PULSES === -->
  <!-- Forward pass pulses (Input -> Hidden1) -->
  <g filter="url(#glow)">
    <circle r="4" fill="#6C63FF">
      <animateMotion dur="1.5s" repeatCount="indefinite" path="M100,60 L270,50"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="4" fill="#6C63FF">
      <animateMotion dur="1.8s" repeatCount="indefinite" path="M100,130 L270,110" begin="0.2s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <circle r="4" fill="#6C63FF">
      <animateMotion dur="1.6s" repeatCount="indefinite" path="M100,200 L270,170" begin="0.4s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.6s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
    <circle r="4" fill="#6C63FF">
      <animateMotion dur="1.7s" repeatCount="indefinite" path="M100,260 L270,230" begin="0.6s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.7s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
  </g>

  <!-- Forward pass pulses (Hidden1 -> Hidden2) -->
  <g filter="url(#glow)">
    <circle r="4" fill="#00b4d8">
      <animateMotion dur="1.4s" repeatCount="indefinite" path="M270,50 L450,70" begin="0.8s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.4s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle r="4" fill="#00b4d8">
      <animateMotion dur="1.6s" repeatCount="indefinite" path="M270,110 L450,140" begin="1s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.6s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle r="4" fill="#00b4d8">
      <animateMotion dur="1.5s" repeatCount="indefinite" path="M270,230 L450,210" begin="1.2s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
  </g>

  <!-- Forward pass pulses (Hidden2 -> Hidden3) -->
  <g filter="url(#glow)">
    <circle r="4" fill="#e63946">
      <animateMotion dur="1.3s" repeatCount="indefinite" path="M450,70 L630,90" begin="1.8s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.3s" repeatCount="indefinite" begin="1.8s"/>
    </circle>
    <circle r="4" fill="#e63946">
      <animateMotion dur="1.5s" repeatCount="indefinite" path="M450,140 L630,170" begin="2s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.5s" repeatCount="indefinite" begin="2s"/>
    </circle>
  </g>

  <!-- Forward pass pulses (Hidden3 -> Output) -->
  <g filter="url(#glowStrong)">
    <circle r="5" fill="#6C63FF">
      <animateMotion dur="1.2s" repeatCount="indefinite" path="M630,90 L800,130" begin="2.8s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.2s" repeatCount="indefinite" begin="2.8s"/>
    </circle>
    <circle r="5" fill="#6C63FF">
      <animateMotion dur="1.4s" repeatCount="indefinite" path="M630,170 L800,190" begin="3s"/>
      <animate attributeName="opacity" values="0;1;1;0" dur="1.4s" repeatCount="indefinite" begin="3s"/>
    </circle>
  </g>

  <!-- Backpropagation pulses (reverse direction) -->
  <g filter="url(#glow)" opacity="0.6">
    <circle r="3" fill="#ff6b8a">
      <animateMotion dur="2s" repeatCount="indefinite" path="M800,150 L630,130" begin="3.5s"/>
      <animate attributeName="opacity" values="0;0.8;0.8;0" dur="2s" repeatCount="indefinite" begin="3.5s"/>
    </circle>
    <circle r="3" fill="#ff6b8a">
      <animateMotion dur="2.2s" repeatCount="indefinite" path="M630,130 L450,140" begin="4s"/>
      <animate attributeName="opacity" values="0;0.8;0.8;0" dur="2.2s" repeatCount="indefinite" begin="4s"/>
    </circle>
    <circle r="3" fill="#ff6b8a">
      <animateMotion dur="2.4s" repeatCount="indefinite" path="M450,140 L270,170" begin="4.5s"/>
      <animate attributeName="opacity" values="0;0.8;0.8;0" dur="2.4s" repeatCount="indefinite" begin="4.5s"/>
    </circle>
  </g>

  <!-- ==================== NODES ==================== -->
  
  <!-- Input Layer -->
  <g>
    <circle cx="100" cy="60" r="12" fill="url(#nodeGrad1)" filter="url(#glow)" opacity="0.9">
      <animate attributeName="r" values="11;13;11" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="130" r="12" fill="url(#nodeGrad1)" filter="url(#glow)" opacity="0.9">
      <animate attributeName="r" values="11;13;11" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="100" cy="200" r="12" fill="url(#nodeGrad1)" filter="url(#glow)" opacity="0.9">
      <animate attributeName="r" values="11;13;11" dur="3s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="100" cy="260" r="12" fill="url(#nodeGrad1)" filter="url(#glow)" opacity="0.9">
      <animate attributeName="r" values="11;13;11" dur="3s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <!-- Input labels -->
    <text x="55" y="64" font-family="'Fira Code', monospace" font-size="9" fill="#6C63FF" opacity="0.7">x₁</text>
    <text x="55" y="134" font-family="'Fira Code', monospace" font-size="9" fill="#6C63FF" opacity="0.7">x₂</text>
    <text x="55" y="204" font-family="'Fira Code', monospace" font-size="9" fill="#6C63FF" opacity="0.7">x₃</text>
    <text x="55" y="264" font-family="'Fira Code', monospace" font-size="9" fill="#6C63FF" opacity="0.7">x₄</text>
  </g>

  <!-- Hidden Layer 1 -->
  <g>
    <circle cx="270" cy="50" r="11" fill="url(#nodeGrad2)" filter="url(#glow)" opacity="0.85">
      <animate attributeName="r" values="10;12;10" dur="2.5s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="270" cy="110" r="11" fill="url(#nodeGrad2)" filter="url(#glow)" opacity="0.85">
      <animate attributeName="r" values="10;12;10" dur="2.5s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <circle cx="270" cy="170" r="11" fill="url(#nodeGrad2)" filter="url(#glow)" opacity="0.85">
      <animate attributeName="r" values="10;12;10" dur="2.5s" repeatCount="indefinite" begin="0.9s"/>
    </circle>
    <circle cx="270" cy="230" r="11" fill="url(#nodeGrad2)" filter="url(#glow)" opacity="0.85">
      <animate attributeName="r" values="10;12;10" dur="2.5s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
  </g>

  <!-- Hidden Layer 2 -->
  <g>
    <circle cx="450" cy="70" r="11" fill="url(#nodeGrad3)" filter="url(#glow)" opacity="0.85">
      <animate attributeName="r" values="10;12;10" dur="2.8s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="450" cy="140" r="11" fill="url(#nodeGrad3)" filter="url(#glow)" opacity="0.85">
      <animate attributeName="r" values="10;12;10" dur="2.8s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="450" cy="210" r="11" fill="url(#nodeGrad3)" filter="url(#glow)" opacity="0.85">
      <animate attributeName="r" values="10;12;10" dur="2.8s" repeatCount="indefinite" begin="1.1s"/>
    </circle>
  </g>

  <!-- Hidden Layer 3 -->
  <g>
    <circle cx="630" cy="90" r="11" fill="url(#nodeGrad2)" filter="url(#glow)" opacity="0.85">
      <animate attributeName="r" values="10;12;10" dur="2.6s" repeatCount="indefinite" begin="0.7s"/>
    </circle>
    <circle cx="630" cy="170" r="11" fill="url(#nodeGrad2)" filter="url(#glow)" opacity="0.85">
      <animate attributeName="r" values="10;12;10" dur="2.6s" repeatCount="indefinite" begin="1s"/>
    </circle>
  </g>

  <!-- Output Layer -->
  <g>
    <circle cx="800" cy="130" r="14" fill="url(#nodeGrad1)" filter="url(#glowStrong)" opacity="0.95">
      <animate attributeName="r" values="13;16;13" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="190" r="14" fill="url(#nodeGrad1)" filter="url(#glowStrong)" opacity="0.95">
      <animate attributeName="r" values="13;16;13" dur="3s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <!-- Output labels -->
    <text x="825" y="134" font-family="'Fira Code', monospace" font-size="9" fill="#6C63FF" opacity="0.7">ŷ₁</text>
    <text x="825" y="194" font-family="'Fira Code', monospace" font-size="9" fill="#6C63FF" opacity="0.7">ŷ₂</text>
  </g>

  <!-- Layer labels -->
  <text x="100" y="295" text-anchor="middle" font-family="'Fira Code', monospace" font-size="10" fill="#6C63FF" opacity="0.5">Input</text>
  <text x="270" y="275" text-anchor="middle" font-family="'Fira Code', monospace" font-size="10" fill="#00b4d8" opacity="0.5">Hidden 1</text>
  <text x="450" y="255" text-anchor="middle" font-family="'Fira Code', monospace" font-size="10" fill="#e63946" opacity="0.5">Hidden 2</text>
  <text x="630" y="215" text-anchor="middle" font-family="'Fira Code', monospace" font-size="10" fill="#00b4d8" opacity="0.5">Hidden 3</text>
  <text x="800" y="230" text-anchor="middle" font-family="'Fira Code', monospace" font-size="10" fill="#6C63FF" opacity="0.5">Output</text>

  <!-- Loss curve mini visualization (bottom-left) -->
  <g transform="translate(30, 250)" opacity="0.4">
    <text x="0" y="-5" font-family="'Fira Code', monospace" font-size="8" fill="#6C63FF">Loss ↓</text>
    <polyline points="0,0 15,-8 30,-5 45,-15 60,-12 75,-20 90,-18 105,-25 120,-22 135,-28 150,-26" 
      fill="none" stroke="#6C63FF" stroke-width="1.5">
      <animate attributeName="stroke-dashoffset" values="200;0" dur="3s" repeatCount="indefinite"/>
    </polyline>
  </g>

  <!-- Accuracy mini visualization (bottom-right) -->
  <g transform="translate(720, 250)" opacity="0.4">
    <text x="0" y="-5" font-family="'Fira Code', monospace" font-size="8" fill="#00b4d8">Acc ↑</text>
    <polyline points="0,0 15,5 30,3 45,12 60,10 75,18 90,16 105,22 120,20 135,26 150,28" 
      fill="none" stroke="#00b4d8" stroke-width="1.5">
      <animate attributeName="stroke-dashoffset" values="200;0" dur="3s" repeatCount="indefinite"/>
    </polyline>
  </g>

  <!-- Title overlay -->
  <text x="450" y="25" text-anchor="middle" font-family="'Fira Code', monospace" font-size="11" fill="#8b949e" opacity="0.6">
    forward pass → backprop → optimize → repeat
  </text>

  <!-- Corner accents -->
  <g stroke="#6C63FF" stroke-width="1" opacity="0.3" fill="none">
    <path d="M15,15 L15,30 M15,15 L30,15"/>
    <path d="M885,15 L885,30 M885,15 L870,15"/>
    <path d="M15,285 L15,270 M15,285 L30,285"/>
    <path d="M885,285 L885,270 M885,285 L870,285"/>
  </g>
</svg>