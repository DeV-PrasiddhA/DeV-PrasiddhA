<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#161b22;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574"/>
      <stop offset="100%" style="stop-color:#c4956a"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="hoodieGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2a3a"/>
      <stop offset="100%" style="stop-color:#0f1923"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="250" cy="230" r="180"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bgGrad)" rx="20"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#6C63FF" stroke-width="0.5">
    <line x1="0" y1="50" x2="500" y2="50"/><line x1="0" y1="100" x2="500" y2="100"/>
    <line x1="0" y1="150" x2="500" y2="150"/><line x1="0" y1="200" x2="500" y2="200"/>
    <line x1="0" y1="250" x2="500" y2="250"/><line x1="0" y1="300" x2="500" y2="300"/>
    <line x1="0" y1="350" x2="500" y2="350"/><line x1="0" y1="400" x2="500" y2="400"/>
    <line x1="0" y1="450" x2="500" y2="450"/>
    <line x1="50" y1="0" x2="50" y2="500"/><line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="150" y1="0" x2="150" y2="500"/><line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="250" y1="0" x2="250" y2="500"/><line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="350" y1="0" x2="350" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
  </g>

  <!-- Glow circle behind portrait -->
  <circle cx="250" cy="220" r="170" fill="url(#glowGrad)" filter="url(#softGlow)" opacity="0.5">
    <animate attributeName="r" values="165;175;165" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Neural network nodes in background -->
  <g opacity="0.15" fill="none" stroke="#6C63FF" stroke-width="1">
    <!-- Layer 1 -->
    <circle cx="50" cy="80" r="4" fill="#6C63FF"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" begin="0s"/></circle>
    <circle cx="50" cy="160" r="4" fill="#6C63FF"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" begin="0.5s"/></circle>
    <circle cx="50" cy="240" r="4" fill="#6C63FF"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" begin="1s"/></circle>
    <circle cx="50" cy="320" r="4" fill="#6C63FF"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" begin="1.5s"/></circle>
    <!-- Layer 2 -->
    <circle cx="120" cy="60" r="4" fill="#00b4d8"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" begin="0.3s"/></circle>
    <circle cx="120" cy="140" r="4" fill="#00b4d8"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" begin="0.8s"/></circle>
    <circle cx="120" cy="220" r="4" fill="#00b4d8"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" begin="1.3s"/></circle>
    <circle cx="120" cy="300" r="4" fill="#00b4d8"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" begin="1.8s"/></circle>
    <!-- Layer 3 (right side) -->
    <circle cx="450" cy="80" r="4" fill="#6C63FF"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" begin="0.2s"/></circle>
    <circle cx="450" cy="160" r="4" fill="#6C63FF"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" begin="0.7s"/></circle>
    <circle cx="450" cy="240" r="4" fill="#6C63FF"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" begin="1.2s"/></circle>
    <circle cx="450" cy="320" r="4" fill="#6C63FF"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" begin="1.7s"/></circle>
    <circle cx="380" cy="60" r="4" fill="#00b4d8"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" begin="0.4s"/></circle>
    <circle cx="380" cy="140" r="4" fill="#00b4d8"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" begin="0.9s"/></circle>
    <circle cx="380" cy="220" r="4" fill="#00b4d8"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" begin="1.4s"/></circle>
    <circle cx="380" cy="300" r="4" fill="#00b4d8"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" begin="1.9s"/></circle>
    <!-- Connections -->
    <line x1="50" y1="80" x2="120" y2="60" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite" begin="0s"/></line>
    <line x1="50" y1="80" x2="120" y2="140" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite" begin="0.2s"/></line>
    <line x1="50" y1="160" x2="120" y2="140" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite" begin="0.4s"/></line>
    <line x1="50" y1="160" x2="120" y2="220" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite" begin="0.6s"/></line>
    <line x1="50" y1="240" x2="120" y2="220" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite" begin="0.8s"/></line>
    <line x1="50" y1="240" x2="120" y2="300" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite" begin="1s"/></line>
    <line x1="50" y1="320" x2="120" y2="300" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite" begin="1.2s"/></line>
    <line x1="450" y1="80" x2="380" y2="60" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite" begin="0.1s"/></line>
    <line x1="450" y1="80" x2="380" y2="140" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite" begin="0.3s"/></line>
    <line x1="450" y1="160" x2="380" y2="140" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite" begin="0.5s"/></line>
    <line x1="450" y1="160" x2="380" y2="220" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite" begin="0.7s"/></line>
    <line x1="450" y1="240" x2="380" y2="220" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite" begin="0.9s"/></line>
    <line x1="450" y1="240" x2="380" y2="300" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite" begin="1.1s"/></line>
    <line x1="450" y1="320" x2="380" y2="300" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="3s" repeatCount="indefinite" begin="1.3s"/></line>
  </g>

  <!-- === PORTRAIT SKETCH === -->
  <g transform="translate(250, 230)">
    
    <!-- Neck -->
    <path d="M-25,55 L-25,90 Q-25,95 -20,95 L20,95 Q25,95 25,90 L25,55" fill="url(#skinGrad)" stroke="#b8896a" stroke-width="1"/>
    
    <!-- Hoodie / Shoulders -->
    <path d="M-90,95 Q-80,85 -50,82 L-30,88 Q-25,92 -20,95 L20,95 Q25,92 30,88 L50,82 Q80,85 90,95 L100,140 Q105,160 120,170 L120,200 L-120,200 L-120,170 Q-105,160 -100,140 Z" fill="url(#hoodieGrad)" stroke="#2a3a4a" stroke-width="1.5"/>
    
    <!-- Hoodie zipper line -->
    <line x1="0" y1="95" x2="0" y2="200" stroke="#2a3a4a" stroke-width="1.5" stroke-dasharray="4,3"/>
    
    <!-- Hoodie collar -->
    <path d="M-30,88 Q-15,100 0,95 Q15,100 30,88" fill="none" stroke="#2a3a4a" stroke-width="1.5"/>
    
    <!-- Face shape -->
    <ellipse cx="0" cy="0" rx="62" ry="72" fill="url(#skinGrad)" stroke="#b8896a" stroke-width="1"/>
    
    <!-- Ears -->
    <ellipse cx="-60" cy="5" rx="10" ry="16" fill="url(#skinGrad)" stroke="#b8896a" stroke-width="1"/>
    <ellipse cx="60" cy="5" rx="10" ry="16" fill="url(#skinGrad)" stroke="#b8896a" stroke-width="1"/>
    
    <!-- Hair -->
    <path d="M-58,-20 Q-62,-55 -50,-65 Q-35,-78 -10,-80 Q10,-82 30,-78 Q50,-72 58,-58 Q62,-45 60,-20 Q58,-30 50,-45 Q40,-60 20,-65 Q0,-68 -20,-65 Q-40,-58 -50,-45 Q-56,-30 -58,-20 Z" fill="url(#hairGrad)" stroke="#0a0a15" stroke-width="1"/>
    
    <!-- Hair detail strands -->
    <path d="M-45,-60 Q-30,-72 -5,-75" fill="none" stroke="#2a2a3e" stroke-width="1" opacity="0.5"/>
    <path d="M-40,-55 Q-25,-68 0,-72" fill="none" stroke="#2a2a3e" stroke-width="1" opacity="0.5"/>
    <path d="M50,-55 Q35,-65 15,-70" fill="none" stroke="#2a2a3e" stroke-width="1" opacity="0.5"/>
    
    <!-- Side-swept fringe -->
    <path d="M-50,-45 Q-35,-58 -15,-62 Q-5,-60 0,-55 Q-10,-52 -20,-48 Q-35,-42 -45,-35 Z" fill="#15152a" opacity="0.7"/>
    
    <!-- Eyebrows -->
    <path d="M-38,-18 Q-28,-25 -15,-20" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M15,-20 Q28,-25 38,-18" fill="none" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Eyes -->
    <g>
      <!-- Left eye -->
      <ellipse cx="-26" cy="-8" rx="14" ry="9" fill="white" stroke="#c4956a" stroke-width="0.5"/>
      <circle cx="-24" cy="-8" r="6" fill="#1a1a2e"/>
      <circle cx="-24" cy="-8" r="3" fill="#0a0a15"/>
      <circle cx="-22" cy="-10" r="1.5" fill="white" opacity="0.9"/>
      <circle cx="-26" cy="-6" r="0.8" fill="white" opacity="0.5"/>
      <!-- Right eye -->
      <ellipse cx="26" cy="-8" rx="14" ry="9" fill="white" stroke="#c4956a" stroke-width="0.5"/>
      <circle cx="24" cy="-8" r="6" fill="#1a1a2e"/>
      <circle cx="24" cy="-8" r="3" fill="#0a0a15"/>
      <circle cx="26" cy="-10" r="1.5" fill="white" opacity="0.9"/>
      <circle cx="22" cy="-6" r="0.8" fill="white" opacity="0.5"/>
    </g>
    
    <!-- Nose -->
    <path d="M0,-2 Q-3,12 -8,18 Q-4,20 0,20 Q4,20 8,18 Q3,12 0,-2" fill="none" stroke="#b8896a" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M-8,18 Q-4,20 0,20" fill="none" stroke="#b8896a" stroke-width="1" opacity="0.5"/>
    
    <!-- Smile -->
    <path d="M-18,30 Q-8,40 0,40 Q8,40 18,30" fill="none" stroke="#a07858" stroke-width="1.8" stroke-linecap="round"/>
    
    <!-- Lips -->
    <path d="M-15,28 Q0,35 15,28" fill="none" stroke="#b8896a" stroke-width="1" opacity="0.5"/>
    
    <!-- Chin definition -->
    <path d="M-30,40 Q0,60 30,40" fill="none" stroke="#b8896a" stroke-width="0.8" opacity="0.3"/>
    
    <!-- Subtle cheek highlights -->
    <ellipse cx="-35" cy="15" rx="12" ry="8" fill="#e0b898" opacity="0.2"/>
    <ellipse cx="35" cy="15" rx="12" ry="8" fill="#e0b898" opacity="0.2"/>
  </g>

  <!-- Circuit board lines around portrait -->
  <g opacity="0.2" stroke="#6C63FF" stroke-width="1" fill="none">
    <path d="M80,100 L80,150 L100,150" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;-10" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M420,100 L420,150 L400,150" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;-10" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M80,350 L80,320 L110,320" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;-10" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </path>
    <path d="M420,350 L420,320 L390,320" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;-10" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </path>
    <!-- Circuit dots -->
    <circle cx="100" cy="150" r="3" fill="#6C63FF"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="400" cy="150" r="3" fill="#6C63FF"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="0.5s"/></circle>
    <circle cx="110" cy="320" r="3" fill="#00b4d8"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="1s"/></circle>
    <circle cx="390" cy="320" r="3" fill="#00b4d8"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="1.5s"/></circle>
  </g>

  <!-- Bottom text -->
  <text x="250" y="460" text-anchor="middle" font-family="'Fira Code', 'Courier New', monospace" font-size="14" fill="#6C63FF" opacity="0.8" filter="url(#glow)">
    PRASIDDHA  MAINALI
  </text>
  <text x="250" y="480" text-anchor="middle" font-family="'Fira Code', 'Courier New', monospace" font-size="10" fill="#8b949e" opacity="0.6">
    AI/ML Researcher &amp; Builder
  </text>

  <!-- Corner decorations -->
  <g stroke="#6C63FF" stroke-width="1.5" opacity="0.4" fill="none">
    <path d="M20,20 L20,40 M20,20 L40,20"/>
    <path d="M480,20 L480,40 M480,20 L460,20"/>
    <path d="M20,480 L20,460 M20,480 L40,480"/>
    <path d="M480,480 L480,460 M480,480 L460,480"/>
  </g>

  <!-- Scan line animation -->
  <rect x="0" y="0" width="500" height="2" fill="#6C63FF" opacity="0.1">
    <animate attributeName="y" values="0;500;0" dur="8s" repeatCount="indefinite"/>
  </rect>
</svg>