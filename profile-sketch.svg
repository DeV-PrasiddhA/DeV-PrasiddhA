<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 580" width="500" height="580">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="50%" style="stop-color:#00b4d8"/>
      <stop offset="100%" style="stop-color:#6C63FF"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="500" height="580" fill="url(#bg)" rx="16"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#6C63FF" stroke-width="0.5">
    <line x1="0" y1="40" x2="500" y2="40"/><line x1="0" y1="80" x2="500" y2="80"/>
    <line x1="0" y1="120" x2="500" y2="120"/><line x1="0" y1="160" x2="500" y2="160"/>
    <line x1="0" y1="200" x2="500" y2="200"/><line x1="0" y1="240" x2="500" y2="240"/>
    <line x1="0" y1="280" x2="500" y2="280"/><line x1="0" y1="320" x2="500" y2="320"/>
    <line x1="0" y1="360" x2="500" y2="360"/><line x1="0" y1="400" x2="500" y2="400"/>
    <line x1="0" y1="440" x2="500" y2="440"/><line x1="0" y1="480" x2="500" y2="480"/>
    <line x1="40" y1="0" x2="40" y2="580"/><line x1="80" y1="0" x2="80" y2="580"/>
    <line x1="120" y1="0" x2="120" y2="580"/><line x1="160" y1="0" x2="160" y2="580"/>
    <line x1="200" y1="0" x2="200" y2="580"/><line x1="240" y1="0" x2="240" y2="580"/>
    <line x1="280" y1="0" x2="280" y2="580"/><line x1="320" y1="0" x2="320" y2="580"/>
    <line x1="360" y1="0" x2="360" y2="580"/><line x1="400" y1="0" x2="400" y2="580"/>
    <line x1="440" y1="0" x2="440" y2="580"/>
  </g>

  <!-- Glow behind portrait -->
  <circle cx="250" cy="210" r="150" fill="none" stroke="#6C63FF" stroke-width="0.5" opacity="0.15">
    <animate attributeName="r" values="145;155;145" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="210" r="120" fill="none" stroke="#00b4d8" stroke-width="0.3" opacity="0.1">
    <animate attributeName="r" values="115;125;115" dur="4s" repeatCount="indefinite" begin="1s"/>
  </circle>

  <!-- ==================== SELF-DRAWING PORTRAIT ==================== -->
  <!-- All paths use stroke-dasharray = total length, stroke-dashoffset animates from total to 0 -->

  <!-- HEAD SHAPE — outer contour -->
  <path d="M250,95 C290,95 325,110 340,140 C355,170 358,200 355,230 C352,260 340,285 320,305 C300,325 275,335 250,338 C225,335 200,325 180,305 C160,285 148,260 145,230 C142,200 145,170 160,140 C175,110 210,95 250,95"
    fill="none" stroke="url(#lineGrad)" stroke-width="2" stroke-linecap="round"
    stroke-dasharray="620" stroke-dashoffset="620" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="620;0" dur="2.5s" fill="freeze" begin="0.3s"/>
  </path>

  <!-- HAIR — main mass -->
  <path d="M165,155 C162,130 170,108 190,95 C210,82 235,78 255,78 C275,78 300,82 318,95 C336,108 342,130 340,155 C338,140 330,120 315,108 C300,96 280,90 260,88 C240,86 220,90 205,100 C190,110 175,130 168,155"
    fill="none" stroke="#4a4a6a" stroke-width="2.5" stroke-linecap="round"
    stroke-dasharray="400" stroke-dashoffset="400">
    <animate attributeName="stroke-dashoffset" values="400;0" dur="2s" fill="freeze" begin="0.5s"/>
  </path>

  <!-- HAIR — side swept fringe (left) -->
  <path d="M168,155 C170,140 178,122 195,110 C205,102 218,97 230,95 C222,100 210,110 200,125 C190,140 178,152 170,160"
    fill="none" stroke="#3a3a5a" stroke-width="2" stroke-linecap="round"
    stroke-dasharray="180" stroke-dashoffset="180">
    <animate attributeName="stroke-dashoffset" values="180;0" dur="1.2s" fill="freeze" begin="1.2s"/>
  </path>

  <!-- HAIR — top strands -->
  <path d="M200,88 C215,82 235,80 255,80 C275,80 295,84 310,92"
    fill="none" stroke="#3a3a5a" stroke-width="1.5" stroke-linecap="round"
    stroke-dasharray="140" stroke-dashoffset="140">
    <animate attributeName="stroke-dashoffset" values="140;0" dur="1s" fill="freeze" begin="1s"/>
  </path>

  <!-- HAIR — right side detail -->
  <path d="M335,150 C332,132 322,115 305,105 C295,98 282,94 270,92"
    fill="none" stroke="#3a3a5a" stroke-width="1.5" stroke-linecap="round"
    stroke-dasharray="120" stroke-dashoffset="120">
    <animate attributeName="stroke-dashoffset" values="120;0" dur="1s" fill="freeze" begin="1.4s"/>
  </path>

  <!-- LEFT EAR -->
  <path d="M155,190 C148,185 145,195 146,208 C147,218 152,225 158,222"
    fill="none" stroke="url(#lineGrad)" stroke-width="1.5" stroke-linecap="round"
    stroke-dasharray="60" stroke-dashoffset="60">
    <animate attributeName="stroke-dashoffset" values="60;0" dur="0.8s" fill="freeze" begin="1.8s"/>
  </path>

  <!-- RIGHT EAR -->
  <path d="M345,190 C352,185 355,195 354,208 C353,218 348,225 342,222"
    fill="none" stroke="url(#lineGrad)" stroke-width="1.5" stroke-linecap="round"
    stroke-dasharray="60" stroke-dashoffset="60">
    <animate attributeName="stroke-dashoffset" values="60;0" dur="0.8s" fill="freeze" begin="1.9s"/>
  </path>

  <!-- LEFT EYEBROW -->
  <path d="M195,178 C205,170 218,168 232,172"
    fill="none" stroke="#6C63FF" stroke-width="2.5" stroke-linecap="round"
    stroke-dasharray="45" stroke-dashoffset="45">
    <animate attributeName="stroke-dashoffset" values="45;0" dur="0.6s" fill="freeze" begin="2.2s"/>
  </path>

  <!-- RIGHT EYEBROW -->
  <path d="M268,172 C282,168 295,170 305,178"
    fill="none" stroke="#6C63FF" stroke-width="2.5" stroke-linecap="round"
    stroke-dasharray="45" stroke-dashoffset="45">
    <animate attributeName="stroke-dashoffset" values="45;0" dur="0.6s" fill="freeze" begin="2.3s"/>
  </path>

  <!-- LEFT EYE — outer -->
  <ellipse cx="218" cy="198" rx="22" ry="13" fill="none" stroke="#00b4d8" stroke-width="1.8"
    stroke-dasharray="115" stroke-dashoffset="115">
    <animate attributeName="stroke-dashoffset" values="115;0" dur="1s" fill="freeze" begin="2.5s"/>
  </ellipse>
  <!-- LEFT EYE — iris -->
  <circle cx="220" cy="198" r="8" fill="none" stroke="#6C63FF" stroke-width="1.5"
    stroke-dasharray="52" stroke-dashoffset="52">
    <animate attributeName="stroke-dashoffset" values="52;0" dur="0.8s" fill="freeze" begin="2.8s"/>
  </circle>
  <!-- LEFT EYE — pupil -->
  <circle cx="220" cy="198" r="4" fill="none" stroke="#ffffff" stroke-width="1"
    stroke-dasharray="26" stroke-dashoffset="26" opacity="0.8">
    <animate attributeName="stroke-dashoffset" values="26;0" dur="0.5s" fill="freeze" begin="3s"/>
  </circle>
  <!-- LEFT EYE — highlight -->
  <circle cx="223" cy="195" r="2" fill="white" opacity="0">
    <animate attributeName="opacity" values="0;0.9" dur="0.3s" fill="freeze" begin="3.3s"/>
  </circle>

  <!-- RIGHT EYE — outer -->
  <ellipse cx="282" cy="198" rx="22" ry="13" fill="none" stroke="#00b4d8" stroke-width="1.8"
    stroke-dasharray="115" stroke-dashoffset="115">
    <animate attributeName="stroke-dashoffset" values="115;0" dur="1s" fill="freeze" begin="2.6s"/>
  </ellipse>
  <!-- RIGHT EYE — iris -->
  <circle cx="280" cy="198" r="8" fill="none" stroke="#6C63FF" stroke-width="1.5"
    stroke-dasharray="52" stroke-dashoffset="52">
    <animate attributeName="stroke-dashoffset" values="52;0" dur="0.8s" fill="freeze" begin="2.9s"/>
  </circle>
  <!-- RIGHT EYE — pupil -->
  <circle cx="280" cy="198" r="4" fill="none" stroke="#ffffff" stroke-width="1"
    stroke-dasharray="26" stroke-dashoffset="26" opacity="0.8">
    <animate attributeName="stroke-dashoffset" values="26;0" dur="0.5s" fill="freeze" begin="3.1s"/>
  </circle>
  <!-- RIGHT EYE — highlight -->
  <circle cx="283" cy="195" r="2" fill="white" opacity="0">
    <animate attributeName="opacity" values="0;0.9" dur="0.3s" fill="freeze" begin="3.4s"/>
  </circle>

  <!-- NOSE — bridge -->
  <path d="M250,210 C248,225 244,240 240,252 C238,258 242,262 250,262 C258,262 262,258 260,252 C256,240 252,225 250,210"
    fill="none" stroke="#00b4d8" stroke-width="1.5" stroke-linecap="round"
    stroke-dasharray="80" stroke-dashoffset="80">
    <animate attributeName="stroke-dashoffset" values="80;0" dur="0.8s" fill="freeze" begin="3.2s"/>
  </path>
  <!-- NOSE — nostril hint -->
  <path d="M242,258 C240,262 244,265 250,265 C256,265 260,262 258,258"
    fill="none" stroke="#00b4d8" stroke-width="1" stroke-linecap="round" opacity="0.5"
    stroke-dasharray="30" stroke-dashoffset="30">
    <animate attributeName="stroke-dashoffset" values="30;0" dur="0.5s" fill="freeze" begin="3.5s"/>
  </path>

  <!-- MOUTH — upper lip -->
  <path d="M225,285 C235,280 245,278 250,278 C255,278 265,280 275,285"
    fill="none" stroke="#6C63FF" stroke-width="1.5" stroke-linecap="round"
    stroke-dasharray="60" stroke-dashoffset="60">
    <animate attributeName="stroke-dashoffset" values="60;0" dur="0.6s" fill="freeze" begin="3.6s"/>
  </path>
  <!-- MOUTH — lower lip / smile -->
  <path d="M225,285 C235,295 245,300 250,300 C255,300 265,295 275,285"
    fill="none" stroke="#6C63FF" stroke-width="1.8" stroke-linecap="round"
    stroke-dasharray="70" stroke-dashoffset="70">
    <animate attributeName="stroke-dashoffset" values="70;0" dur="0.7s" fill="freeze" begin="3.7s"/>
  </path>

  <!-- JAW LINE refinement -->
  <path d="M180,305 C200,325 225,335 250,338 C275,335 300,325 320,305"
    fill="none" stroke="#00b4d8" stroke-width="1" stroke-linecap="round" opacity="0.3"
    stroke-dasharray="180" stroke-dashoffset="180">
    <animate attributeName="stroke-dashoffset" values="180;0" dur="1s" fill="freeze" begin="2s"/>
  </path>

  <!-- NECK -->
  <path d="M230,338 L228,380 M270,338 L272,380"
    fill="none" stroke="url(#lineGrad)" stroke-width="1.8" stroke-linecap="round"
    stroke-dasharray="90" stroke-dashoffset="90">
    <animate attributeName="stroke-dashoffset" values="90;0" dur="0.8s" fill="freeze" begin="4s"/>
  </path>

  <!-- HOODIE / SHOULDERS -->
  <path d="M160,400 C175,385 200,378 228,380 L272,380 C300,378 325,385 340,400 L360,450 L360,500 L140,500 L140,450 Z"
    fill="none" stroke="#4a4a6a" stroke-width="2" stroke-linecap="round"
    stroke-dasharray="520" stroke-dashoffset="520">
    <animate attributeName="stroke-dashoffset" values="520;0" dur="2s" fill="freeze" begin="4.2s"/>
  </path>

  <!-- HOODIE — collar -->
  <path d="M228,380 C235,392 245,398 250,398 C255,398 265,392 272,380"
    fill="none" stroke="#4a4a6a" stroke-width="1.5" stroke-linecap="round"
    stroke-dasharray="60" stroke-dashoffset="60">
    <animate attributeName="stroke-dashoffset" values="60;0" dur="0.6s" fill="freeze" begin="5s"/>
  </path>

  <!-- HOODIE — zipper -->
  <path d="M250,398 L250,500"
    fill="none" stroke="#4a4a6a" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="6,4"
    stroke-dasharray="110" stroke-dashoffset="110">
    <animate attributeName="stroke-dashoffset" values="110;0" dur="1s" fill="freeze" begin="5.2s"/>
  </path>

  <!-- === NEURAL NETWORK NODES (background, appear after portrait) === -->
  <g opacity="0" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0;0.25" dur="1s" fill="freeze" begin="5.5s"/>
    <!-- Left cluster -->
    <circle cx="55" cy="120" r="4" fill="#6C63FF"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite" begin="5.5s"/></circle>
    <circle cx="45" cy="200" r="4" fill="#6C63FF"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite" begin="5.8s"/></circle>
    <circle cx="60" cy="280" r="4" fill="#6C63FF"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite" begin="6.1s"/></circle>
    <circle cx="50" cy="360" r="4" fill="#00b4d8"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite" begin="6.4s"/></circle>
    <line x1="55" y1="120" x2="45" y2="200" stroke="#6C63FF" stroke-width="0.5" opacity="0.2"/>
    <line x1="45" y1="200" x2="60" y2="280" stroke="#6C63FF" stroke-width="0.5" opacity="0.2"/>
    <line x1="60" y1="280" x2="50" y2="360" stroke="#00b4d8" stroke-width="0.5" opacity="0.2"/>
    <!-- Right cluster -->
    <circle cx="445" cy="120" r="4" fill="#6C63FF"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite" begin="5.7s"/></circle>
    <circle cx="455" cy="200" r="4" fill="#6C63FF"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite" begin="6s"/></circle>
    <circle cx="440" cy="280" r="4" fill="#00b4d8"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite" begin="6.3s"/></circle>
    <circle cx="450" cy="360" r="4" fill="#00b4d8"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="3s" repeatCount="indefinite" begin="6.6s"/></circle>
    <line x1="445" y1="120" x2="455" y2="200" stroke="#6C63FF" stroke-width="0.5" opacity="0.2"/>
    <line x1="455" y1="200" x2="440" y2="280" stroke="#00b4d8" stroke-width="0.5" opacity="0.2"/>
    <line x1="440" y1="280" x2="450" y2="360" stroke="#00b4d8" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- Scan line -->
  <rect x="0" y="0" width="500" height="1.5" fill="#6C63FF" opacity="0.08">
    <animate attributeName="y" values="0;580;0" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner brackets -->
  <g stroke="#6C63FF" stroke-width="1.5" opacity="0.3" fill="none">
    <path d="M18,18 L18,36 M18,18 L36,18"/>
    <path d="M482,18 L482,36 M482,18 L464,18"/>
    <path d="M18,562 L18,544 M18,562 L36,562"/>
    <path d="M482,562 L482,544 M482,562 L464,562"/>
  </g>

  <!-- Bottom caption -->
  <text x="250" y="540" text-anchor="middle" font-family="'Fira Code','Courier New',monospace" font-size="11" fill="#6C63FF" opacity="0" filter="url(#glow)">
    self_portrait.render()
    <animate attributeName="opacity" values="0;0.8" dur="0.5s" fill="freeze" begin="6s"/>
  </text>
  <text x="250" y="558" text-anchor="middle" font-family="'Fira Code','Courier New',monospace" font-size="9" fill="#8b949e" opacity="0">
    drawn by my own CV pipeline
    <animate attributeName="opacity" values="0;0.5" dur="0.5s" fill="freeze" begin="6.3s"/>
  </text>
</svg>