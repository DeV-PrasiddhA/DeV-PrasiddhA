<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" width="500" height="600">
  <defs>
    <!-- Enhanced Gradients -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1"/>
    </linearGradient>
    
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#6C63FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ff006e;stop-opacity:1"/>
    </linearGradient>
    
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:1"/>
    </linearGradient>
    
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:0"/>
    </radialGradient>
    
    <!-- Enhanced Filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feComponentTransfer><feFuncA type="linear" slope="1.5"/></feComponentTransfer>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Animated Background -->
  <rect width="500" height="600" fill="url(#bg)" rx="20"/>
  
  <!-- Background Grid Pattern -->
  <g opacity="0.04" stroke="#00d9ff" stroke-width="0.5">
    <line x1="0" y1="30" x2="500" y2="30"/><line x1="0" y1="60" x2="500" y2="60"/>
    <line x1="0" y1="90" x2="500" y2="90"/><line x1="0" y1="120" x2="500" y2="120"/>
    <line x1="0" y1="150" x2="500" y2="150"/><line x1="0" y1="180" x2="500" y2="180"/>
    <line x1="0" y1="210" x2="500" y2="210"/><line x1="0" y1="240" x2="500" y2="240"/>
    <line x1="0" y1="270" x2="500" y2="270"/><line x1="0" y1="300" x2="500" y2="300"/>
    <line x1="0" y1="330" x2="500" y2="330"/><line x1="0" y1="360" x2="500" y2="360"/>
    <line x1="0" y1="390" x2="500" y2="390"/><line x1="0" y1="420" x2="500" y2="420"/>
    <line x1="30" y1="0" x2="30" y2="600"/><line x1="60" y1="0" x2="60" y2="600"/>
    <line x1="90" y1="0" x2="90" y2="600"/><line x1="120" y1="0" x2="120" y2="600"/>
    <line x1="150" y1="0" x2="150" y2="600"/><line x1="180" y1="0" x2="180" y2="600"/>
    <line x1="210" y1="0" x2="210" y2="600"/><line x1="240" y1="0" x2="240" y2="600"/>
    <line x1="270" y1="0" x2="270" y2="600"/><line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="330" y1="0" x2="330" y2="600"/><line x1="360" y1="0" x2="360" y2="600"/>
    <line x1="390" y1="0" x2="390" y2="600"/><line x1="420" y1="0" x2="420" y2="600"/>
    <line x1="450" y1="0" x2="450" y2="600"/>
  </g>

  <!-- Animated Glow Rings -->
  <circle cx="250" cy="220" r="160" fill="none" stroke="#6C63FF" stroke-width="0.8" opacity="0.15">
    <animate attributeName="r" values="155;170;155" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.25;0.15" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="220" r="125" fill="none" stroke="#00d9ff" stroke-width="0.5" opacity="0.1">
    <animate attributeName="r" values="120;135;120" dur="5s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="250" cy="220" r="95" fill="none" stroke="#ff006e" stroke-width="0.3" opacity="0.08">
    <animate attributeName="r" values="90;105;90" dur="4s" repeatCount="indefinite" begin="0.5s"/>
  </circle>

  <!-- ==================== ANIMATED PORTRAIT ==================== -->

  <!-- HEAD SHAPE — outer contour -->
  <path d="M250,100 C295,100 330,115 345,150 C360,185 363,215 360,245 C357,280 343,305 320,325 C297,345 272,355 250,358 C228,355 203,345 180,325 C157,305 143,280 140,245 C137,215 140,185 155,150 C170,115 205,100 250,100 Z"
    fill="none" stroke="url(#lineGrad)" stroke-width="2.2" stroke-linecap="round" filter="url(#glow)"
    stroke-dasharray="625" stroke-dashoffset="625">
    <animate attributeName="stroke-dashoffset" values="625;0" dur="3s" fill="freeze" begin="0.2s"/>
  </path>

  <!-- HAIR — main mass -->
  <path d="M165,160 C162,130 172,105 195,92 C215,82 240,78 260,78 C280,78 305,82 325,92 C348,105 358,130 355,160 C352,145 342,120 320,108 C300,96 278,90 260,88 C242,86 220,90 205,100 C188,112 175,135 170,160"
    fill="none" stroke="#4a5a7a" stroke-width="2.5" stroke-linecap="round"
    stroke-dasharray="410" stroke-dashoffset="410">
    <animate attributeName="stroke-dashoffset" values="410;0" dur="2.2s" fill="freeze" begin="0.4s"/>
  </path>

  <!-- HAIR — fringe left -->
  <path d="M170,160 C175,135 188,115 205,105 C215,98 228,93 240,90 C225,98 210,115 200,135 C190,155 178,168 170,175"
    fill="none" stroke="#3a4a6a" stroke-width="2" stroke-linecap="round"
    stroke-dasharray="190" stroke-dashoffset="190">
    <animate attributeName="stroke-dashoffset" values="190;0" dur="1.3s" fill="freeze" begin="1s"/>
  </path>

  <!-- HAIR — top strands -->
  <path d="M200,88 C220,80 240,78 260,78 C280,78 300,82 320,92"
    fill="none" stroke="#3a4a6a" stroke-width="1.8" stroke-linecap="round"
    stroke-dasharray="155" stroke-dashoffset="155">
    <animate attributeName="stroke-dashoffset" values="155;0" dur="1.1s" fill="freeze" begin="1.1s"/>
  </path>

  <!-- HAIR — right side -->
  <path d="M340,155 C337,130 325,110 305,100 C290,92 275,88 265,87"
    fill="none" stroke="#3a4a6a" stroke-width="1.8" stroke-linecap="round"
    stroke-dasharray="130" stroke-dashoffset="130">
    <animate attributeName="stroke-dashoffset" values="130;0" dur="1.1s" fill="freeze" begin="1.3s"/>
  </path>

  <!-- LEFT EAR -->
  <path d="M155,195 C147,190 144,200 145,215 C146,227 153,235 160,230"
    fill="none" stroke="url(#lineGrad)" stroke-width="1.8" stroke-linecap="round" filter="url(#glow)"
    stroke-dasharray="70" stroke-dashoffset="70">
    <animate attributeName="stroke-dashoffset" values="70;0" dur="0.9s" fill="freeze" begin="1.6s"/>
  </path>

  <!-- RIGHT EAR -->
  <path d="M345,195 C353,190 356,200 355,215 C354,227 347,235 340,230"
    fill="none" stroke="url(#lineGrad)" stroke-width="1.8" stroke-linecap="round" filter="url(#glow)"
    stroke-dasharray="70" stroke-dashoffset="70">
    <animate attributeName="stroke-dashoffset" values="70;0" dur="0.9s" fill="freeze" begin="1.7s"/>
  </path>

  <!-- LEFT EYEBROW -->
  <path d="M193,183 C208,173 225,170 238,175"
    fill="none" stroke="#00d9ff" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"
    stroke-dasharray="50" stroke-dashoffset="50">
    <animate attributeName="stroke-dashoffset" values="50;0" dur="0.7s" fill="freeze" begin="2s"/>
  </path>

  <!-- RIGHT EYEBROW -->
  <path d="M262,175 C275,170 292,173 307,183"
    fill="none" stroke="#00d9ff" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"
    stroke-dasharray="50" stroke-dashoffset="50">
    <animate attributeName="stroke-dashoffset" values="50;0" dur="0.7s" fill="freeze" begin="2.1s"/>
  </path>

  <!-- LEFT EYE — outer -->
  <ellipse cx="220" cy="205" rx="24" ry="15" fill="none" stroke="#00d9ff" stroke-width="2" filter="url(#glow)"
    stroke-dasharray="130" stroke-dashoffset="130">
    <animate attributeName="stroke-dashoffset" values="130;0" dur="1.1s" fill="freeze" begin="2.3s"/>
  </ellipse>

  <!-- LEFT EYE — iris -->
  <circle cx="222" cy="205" r="9" fill="none" stroke="#6C63FF" stroke-width="2"
    stroke-dasharray="58" stroke-dashoffset="58">
    <animate attributeName="stroke-dashoffset" values="58;0" dur="0.9s" fill="freeze" begin="2.6s"/>
  </circle>

  <!-- LEFT EYE — pupil -->
  <circle cx="222" cy="205" r="5" fill="none" stroke="#00d9ff" stroke-width="1.2"
    stroke-dasharray="32" stroke-dashoffset="32" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="32;0" dur="0.6s" fill="freeze" begin="2.9s"/>
  </circle>

  <!-- LEFT EYE — highlight -->
  <circle cx="225" cy="201" r="2.5" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze" begin="3.2s"/>
  </circle>

  <!-- RIGHT EYE — outer -->
  <ellipse cx="280" cy="205" rx="24" ry="15" fill="none" stroke="#00d9ff" stroke-width="2" filter="url(#glow)"
    stroke-dasharray="130" stroke-dashoffset="130">
    <animate attributeName="stroke-dashoffset" values="130;0" dur="1.1s" fill="freeze" begin="2.4s"/>
  </ellipse>

  <!-- RIGHT EYE — iris -->
  <circle cx="278" cy="205" r="9" fill="none" stroke="#6C63FF" stroke-width="2"
    stroke-dasharray="58" stroke-dashoffset="58">
    <animate attributeName="stroke-dashoffset" values="58;0" dur="0.9s" fill="freeze" begin="2.7s"/>
  </circle>

  <!-- RIGHT EYE — pupil -->
  <circle cx="278" cy="205" r="5" fill="none" stroke="#00d9ff" stroke-width="1.2"
    stroke-dasharray="32" stroke-dashoffset="32" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="32;0" dur="0.6s" fill="freeze" begin="3s"/>
  </circle>

  <!-- RIGHT EYE — highlight -->
  <circle cx="281" cy="201" r="2.5" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" fill="freeze" begin="3.3s"/>
  </circle>

  <!-- NOSE — bridge -->
  <path d="M250,218 C248,235 244,252 240,265 C238,272 242,276 250,276 C258,276 262,272 260,265 C256,252 252,235 250,218"
    fill="none" stroke="#ff006e" stroke-width="1.8" stroke-linecap="round" filter="url(#glow)"
    stroke-dasharray="90" stroke-dashoffset="90">
    <animate attributeName="stroke-dashoffset" values="90;0" dur="0.95s" fill="freeze" begin="3.1s"/>
  </path>

  <!-- NOSE — nostrils -->
  <path d="M242,272 C240,276 244,278 250,278 C256,278 260,276 258,272"
    fill="none" stroke="#ff006e" stroke-width="1" stroke-linecap="round" opacity="0.6" filter="url(#glow)"
    stroke-dasharray="35" stroke-dashoffset="35">
    <animate attributeName="stroke-dashoffset" values="35;0" dur="0.6s" fill="freeze" begin="3.4s"/>
  </path>

  <!-- MOUTH — upper lip -->
  <path d="M228,295 C240,288 245,286 250,286 C255,286 260,288 272,295"
    fill="none" stroke="#00d9ff" stroke-width="1.8" stroke-linecap="round" filter="url(#glow)"
    stroke-dasharray="70" stroke-dashoffset="70">
    <animate attributeName="stroke-dashoffset" values="70;0" dur="0.75s" fill="freeze" begin="3.5s"/>
  </path>

  <!-- MOUTH — lower lip / smile -->
  <path d="M228,295 C240,308 245,314 250,314 C255,314 260,308 272,295"
    fill="none" stroke="#ff006e" stroke-width="2" stroke-linecap="round" filter="url(#glow)"
    stroke-dasharray="80" stroke-dashoffset="80">
    <animate attributeName="stroke-dashoffset" values="80;0" dur="0.85s" fill="freeze" begin="3.6s"/>
  </path>

  <!-- JAW LINE refinement -->
  <path d="M182,315 C205,338 228,350 250,353 C272,350 295,338 318,315"
    fill="none" stroke="#6C63FF" stroke-width="1.2" stroke-linecap="round" opacity="0.4" filter="url(#glow)"
    stroke-dasharray="190" stroke-dashoffset="190">
    <animate attributeName="stroke-dashoffset" values="190;0" dur="1.15s" fill="freeze" begin="1.8s"/>
  </path>

  <!-- NECK -->
  <path d="M232,353 L230,395 M268,353 L270,395"
    fill="none" stroke="url(#lineGrad)" stroke-width="2" stroke-linecap="round" filter="url(#glow)"
    stroke-dasharray="95" stroke-dashoffset="95">
    <animate attributeName="stroke-dashoffset" values="95;0" dur="0.9s" fill="freeze" begin="3.8s"/>
  </path>

  <!-- HOODIE / SHOULDERS -->
  <path d="M162,415 C180,395 208,385 232,388 L268,388 C292,385 320,395 338,415 L360,470 L360,520 L140,520 L140,470 Z"
    fill="none" stroke="#4a5a7a" stroke-width="2.2" stroke-linecap="round" filter="url(#glow)"
    stroke-dasharray="560" stroke-dashoffset="560">
    <animate attributeName="stroke-dashoffset" values="560;0" dur="2.2s" fill="freeze" begin="4s"/>
  </path>

  <!-- HOODIE — collar detail -->
  <path d="M232,388 C240,402 246,410 250,410 C254,410 260,402 268,388"
    fill="none" stroke="#4a5a7a" stroke-width="1.8" stroke-linecap="round"
    stroke-dasharray="70" stroke-dashoffset="70">
    <animate attributeName="stroke-dashoffset" values="70;0" dur="0.8s" fill="freeze" begin="4.8s"/>
  </path>

  <!-- HOODIE — central zipper -->
  <path d="M250,410 L250,520"
    fill="none" stroke="#3a4a6a" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="8,5"
    stroke-dasharray="120" stroke-dashoffset="120" opacity="0.7">
    <animate attributeName="stroke-dashoffset" values="120;0" dur="1.1s" fill="freeze" begin="5s"/>
  </path>

  <!-- === NEURAL NETWORK NODES (intelligent systems visualization) === -->
  <g opacity="0" filter="url(#strongGlow)">
    <animate attributeName="opacity" values="0;0.4" dur="1.2s" fill="freeze" begin="5.3s"/>
    
    <!-- Left neural cluster -->
    <circle cx="55" cy="100" r="5" fill="#00d9ff"/>
    <circle cx="40" cy="190" r="4" fill="#6C63FF"/>
    <circle cx="65" cy="280" r="4.5" fill="#ff006e"/>
    <circle cx="48" cy="370" r="4" fill="#00d9ff"/>
    
    <!-- Connecting lines -->
    <line x1="55" y1="100" x2="40" y2="190" stroke="#00d9ff" stroke-width="0.8" opacity="0.4"/>
    <line x1="40" y1="190" x2="65" y2="280" stroke="#6C63FF" stroke-width="0.8" opacity="0.3"/>
    <line x1="65" y1="280" x2="48" y2="370" stroke="#ff006e" stroke-width="0.8" opacity="0.3"/>
    <line x1="55" y1="100" x2="65" y2="280" stroke="#6C63FF" stroke-width="0.6" opacity="0.2" stroke-dasharray="3,3"/>
    
    <!-- Right neural cluster -->
    <circle cx="445" cy="105" r="5" fill="#6C63FF"/>
    <circle cx="460" cy="195" r="4" fill="#ff006e"/>
    <circle cx="435" cy="285" r="4.5" fill="#00d9ff"/>
    <circle cx="452" cy="375" r="4" fill="#6C63FF"/>
    
    <!-- Connecting lines -->
    <line x1="445" y1="105" x2="460" y2="195" stroke="#6C63FF" stroke-width="0.8" opacity="0.4"/>
    <line x1="460" y1="195" x2="435" y2="285" stroke="#ff006e" stroke-width="0.8" opacity="0.3"/>
    <line x1="435" y1="285" x2="452" y2="375" stroke="#00d9ff" stroke-width="0.8" opacity="0.3"/>
    <line x1="445" y1="105" x2="435" y2="285" stroke="#ff006e" stroke-width="0.6" opacity="0.2" stroke-dasharray="3,3"/>
    
    <!-- Floating particles -->
    <circle cx="120" cy="140" r="2" fill="#00d9ff" opacity="0.6"/>
    <circle cx="380" cy="160" r="2" fill="#6C63FF" opacity="0.6"/>
    <circle cx="145" cy="400" r="2" fill="#ff006e" opacity="0.5"/>
    <circle cx="355" cy="410" r="2" fill="#00d9ff" opacity="0.5"/>
  </g>

  <!-- Animated scan line -->
  <rect x="0" y="0" width="500" height="2" fill="#00d9ff" opacity="0.12" filter="url(#glow)">
    <animate attributeName="y" values="0;600;0" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner brackets (frame effect) -->
  <g stroke="#6C63FF" stroke-width="1.8" opacity="0.4" fill="none" filter="url(#glow)">
    <path d="M20,20 L20,40 M20,20 L40,20"/>
    <path d="M480,20 L480,40 M480,20 L460,20"/>
    <path d="M20,580 L20,560 M20,580 L40,580"/>
    <path d="M480,580 L480,560 M480,580 L460,580"/>
  </g>

  <!-- Top edge accent -->
  <line x1="0" y1="2" x2="500" y2="2" stroke="#ff006e" stroke-width="1.5" opacity="0.3"/>

  <!-- Bottom captions -->
  <text x="250" y="555" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="12" font-weight="500" fill="#00d9ff" opacity="0" filter="url(#glow)" letter-spacing="1">
    self_portrait.render()
    <animate attributeName="opacity" values="0;1" dur="0.6s" fill="freeze" begin="5.8s"/>
  </text>
  
  <text x="250" y="575" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#8b949e" opacity="0" letter-spacing="0.5">
    drawn by my own CV pipeline
    <animate attributeName="opacity" values="0;0.7" dur="0.6s" fill="freeze" begin="6.1s"/>
  </text>

  <!-- Version info -->
  <text x="250" y="593" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="8" fill="#6C63FF" opacity="0.3">
    v2.1 • enhanced cyberpunk aesthetic
  </text>
</svg>