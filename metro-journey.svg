<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="mbg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="mgl"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <linearGradient id="line1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C63FF"/><stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
  </defs>
  <rect width="900" height="200" fill="url(#mbg)" rx="12"/>

  <!-- Main metro line — animated draw -->
  <line x1="80" y1="100" x2="820" y2="100" stroke="url(#line1)" stroke-width="4" stroke-linecap="round"
    stroke-dasharray="740" stroke-dashoffset="740" opacity="0.6">
    <animate attributeName="stroke-dashoffset" values="740;0" dur="3s" fill="freeze" begin="0.2s"/>
  </line>

  <!-- Station dots and labels -->
  <!-- Station 1: Class 11 — The Beginning -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="0.8s"/>
    <circle cx="80" cy="100" r="8" fill="#0d1117" stroke="#6C63FF" stroke-width="2.5"/>
    <circle cx="80" cy="100" r="4" fill="#6C63FF">
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <text x="80" y="75" text-anchor="middle" font-family="'Fira Code',monospace" font-size="10" fill="#6C63FF" font-weight="bold">Class 11</text>
    <text x="80" y="135" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#8b949e">first line of</text>
    <text x="80" y="148" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#8b949e">Python code</text>
  </g>

  <!-- Station 2: NATERIDA v1 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="1.3s"/>
    <circle cx="230" cy="100" r="8" fill="#0d1117" stroke="#00b4d8" stroke-width="2.5"/>
    <circle cx="230" cy="100" r="4" fill="#00b4d8">
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    <text x="230" y="75" text-anchor="middle" font-family="'Fira Code',monospace" font-size="10" fill="#00b4d8" font-weight="bold">NATERIDA v1</text>
    <text x="230" y="135" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#8b949e">agricultural rover</text>
    <text x="230" y="148" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#8b949e">first real build</text>
  </g>

  <!-- Station 3: The Rebuild -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="1.8s"/>
    <circle cx="380" cy="100" r="8" fill="#0d1117" stroke="#e63946" stroke-width="2.5"/>
    <circle cx="380" cy="100" r="4" fill="#e63946">
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <text x="380" y="75" text-anchor="middle" font-family="'Fira Code',monospace" font-size="10" fill="#e63946" font-weight="bold">The Rebuild</text>
    <text x="380" y="135" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#8b949e">rebuilt NATERIDA</text>
    <text x="380" y="148" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#8b949e">after losing year one</text>
  </g>

  <!-- Station 4: NOAI Rank 2 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="2.3s"/>
    <circle cx="530" cy="100" r="8" fill="#0d1117" stroke="#f4a261" stroke-width="2.5"/>
    <circle cx="530" cy="100" r="4" fill="#f4a261">
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" begin="2.5s"/>
    </circle>
    <text x="530" y="75" text-anchor="middle" font-family="'Fira Code',monospace" font-size="10" fill="#f4a261" font-weight="bold">NOAI — Rank #2</text>
    <text x="530" y="135" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#8b949e">national olympiad</text>
    <text x="530" y="148" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#8b949e">in AI — Nepal</text>
  </g>

  <!-- Station 5: Nidaan -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="2.8s"/>
    <circle cx="680" cy="100" r="8" fill="#0d1117" stroke="#2ec4b6" stroke-width="2.5"/>
    <circle cx="680" cy="100" r="4" fill="#2ec4b6">
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" begin="3s"/>
    </circle>
    <text x="680" y="75" text-anchor="middle" font-family="'Fira Code',monospace" font-size="10" fill="#2ec4b6" font-weight="bold">Nidaan</text>
    <text x="680" y="135" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#8b949e">AI medical diagnostics</text>
    <text x="680" y="148" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#8b949e">platform — shipping</text>
  </g>

  <!-- Station 6: Where I am now -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="3.3s"/>
    <circle cx="820" cy="100" r="10" fill="#0d1117" stroke="#6C63FF" stroke-width="3"/>
    <circle cx="820" cy="100" r="5" fill="#6C63FF">
      <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite" begin="3.5s"/>
    </circle>
    <text x="820" y="70" text-anchor="middle" font-family="'Fira Code',monospace" font-size="10" fill="#6C63FF" font-weight="bold">→ Next</text>
    <text x="820" y="135" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#8b949e">still building,</text>
    <text x="820" y="148" text-anchor="middle" font-family="'Fira Code',monospace" font-size="8" fill="#8b949e">still shipping</text>
  </g>

  <!-- Train dot that travels along the line -->
  <circle r="6" fill="#6C63FF" filter="url(#mgl)" opacity="0.8">
    <animateMotion dur="4s" repeatCount="indefinite" path="M80,100 L820,100" begin="3.5s"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="4s" repeatCount="indefinite" begin="3.5s"/>
  </circle>
</svg>