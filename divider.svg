<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 20" width="900" height="20">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1"/>
      <stop offset="20%" style="stop-color:#6C63FF;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#00b4d8;stop-opacity:0.8"/>
      <stop offset="80%" style="stop-color:#6C63FF;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="900" height="20" fill="#0d1117"/>
  <line x1="0" y1="10" x2="900" y2="10" stroke="url(#divGrad)" stroke-width="1.5"/>
  <circle r="3" fill="#6C63FF" filter="url(#glow)">
    <animateMotion dur="4s" repeatCount="indefinite" path="M0,10 L900,10"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#00b4d8">
    <animateMotion dur="4s" repeatCount="indefinite" path="M900,10 L0,10" begin="2s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" begin="2s"/>
  </circle>
</svg>